async function handleLogin(e){
  e.preventDefault();
  const btn=document.getElementById("loginSubmitBtn");
  const sid=document.getElementById("studentId").value.trim();
  const y=selectedYear;
  if(!/^\d{10}$/.test(sid))return toast("รหัสนักศึกษาต้องเป็นตัวเลข 10 หลัก","error");
  btn.disabled=true;btn.innerHTML='<span class="spinner"></span> <span class="ml-2">กำลังตรวจสอบ...</span>';
  const reset=()=>{btn.disabled=false;btn.innerHTML="เข้าสู่ระบบ"};
  let fullName="";
  try{
    if(y==="1"){
      let rec=null;
      if(db){try{const snap=await getDoc(doc(db,"year1_roster",sid));if(snap.exists())rec=snap.data()}catch(er){console.warn(er)}}
      if(!rec){const local=YEAR1_ROSTER.find(r=>r.id===sid);if(local)rec={studentId:local.id,fullName:local.name}}
      if(!rec){reset();return toast("ไม่พบรหัสนี้ในฐานข้อมูลปี 1","error",4000)}
      fullName=rec.fullName||rec.name||"";
    }else{
      fullName=document.getElementById("fullName").value.trim();
      if(!fullName){reset();return toast("กรุณากรอกชื่อ-นามสกุล","error")}
      if(fullName.length<3){reset();return toast("ชื่อสั้นเกินไป","error")}
    }
    const u={studentId:sid,fullName,yearOfStudy:y,createdAt:new Date().toISOString()};
    try{localStorage.setItem("studystation_user",JSON.stringify(u));currentUser=u}catch{reset();return toast("บันทึกในเครื่องไม่สำเร็จ","error")}
    if(db){try{await setDoc(doc(db,"users",sid),u,{merge:true})}catch(er){console.warn(er)}}
    toast("ยินดีต้อนรับ "+fullName);
    setTimeout(()=>renderDashboard(),400);
  }catch(err){console.error(err);reset();toast("เข้าสู่ระบบไม่สำเร็จ: "+err.message,"error",5000)}
}

function buildTypeGroups(){
  const map=new Map();
  for(const it of itemsCache){
    if(!it.type)continue;
    let g=map.get(it.type);
    if(!g){g={type:it.type,name:it.name||it.type,color:it.color||"from-slate-100 to-gray-200",consumable:!!it.consumable,units:[],stockRec:null};map.set(it.type,g)}
    if(it.consumable){g.consumable=true;g.stockRec=it;if(it.name)g.name=it.name;if(it.color)g.color=it.color}
    else{g.units.push(it);if(it.name)g.name=it.name;if(it.color)g.color=it.color}
  }
  const seedOrder=EQUIPMENT_TYPES.map(e=>e.type);
  return [...map.values()].sort((a,b)=>{const ai=seedOrder.indexOf(a.type),bi=seedOrder.indexOf(b.type);if(ai===-1&&bi===-1)return a.name.localeCompare(b.name);if(ai===-1)return 1;if(bi===-1)return -1;return ai-bi});
}

async function confirmConsume(e,eq,rec,maxQ){
  e.preventDefault();const btn=document.getElementById("confirmBtn");
  let n=parseInt(document.getElementById("qty").value,10);
  if(!Number.isFinite(n)||n<1)return toast("กรุณากรอกจำนวนให้ถูกต้อง","error");
  if(n>maxQ)return toast(`เบิกได้สูงสุด ${maxQ} ชิ้น`,"error");
  btn.disabled=true;btn.innerHTML='<span class="spinner"></span> <span class="ml-2">กำลังบันทึก...</span>';
  try{
    const ref=doc(db,"items",rec.id);const snap=await getDoc(ref);
    if(!snap.exists()){toast("ไม่พบรายการ","error");document.getElementById("bookingModal").remove();await loadItems();return}
    const curStock=snap.data().stock||0;
    if(curStock<n){toast(`คงเหลือเพียง ${curStock} ชิ้น`,"error");document.getElementById("bookingModal").remove();await loadItems();return}
    await addDoc(collection(db,"bookings"),{itemId:rec.itemId,itemName:eq.name,itemType:eq.type,studentId:currentUser.studentId,studentName:currentUser.fullName,yearOfStudy:currentUser.yearOfStudy,quantity:n,consumable:true,status:"Consumed",createdAt:serverTimestamp()});
    await updateDoc(ref,{stock:increment(-n)});
    const idx=itemsCache.findIndex(i=>i.id===rec.id);if(idx!==-1)itemsCache[idx].stock=curStock-n;
    document.getElementById("bookingModal").remove();renderItemsGrouped();toast(`เบิก ${eq.name} ${n} ชิ้นสำเร็จ 🎉`)
  }catch(err){console.error(err);btn.disabled=false;btn.innerHTML="ยืนยันเบิก";toast("บันทึกไม่สำเร็จ: "+err.message,"error",5000)}
}
async function confirmBooking(e){
  e.preventDefault();const btn=document.getElementById("confirmBtn");const uid=document.getElementById("selUnit").value;
  const stTime=document.getElementById("startTime").value;
  const etTime=document.getElementById("endTime").value;
  if(!stTime||!etTime)return toast("กรุณากรอกเวลาให้ครบ","error");
  if(stTime<"08:00"||stTime>"17:00")return toast("เวลาเริ่มต้องอยู่ในช่วง 08:00 - 17:00","error");
  if(etTime<"08:00"||etTime>"17:00")return toast("เวลาสิ้นสุดต้องอยู่ในช่วง 08:00 - 17:00","error");
  if(etTime<=stTime)return toast("เวลาสิ้นสุดต้องหลังเวลาเริ่ม","error");
  btn.disabled=true;btn.innerHTML='<span class="spinner"></span> <span class="ml-2">กำลังบันทึก...</span>';
  try{
    const now=new Date();const pad=n=>String(n).padStart(2,"0");
    const datePrefix=`${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`;
    const st=`${datePrefix}T${stTime}`;
    const et=`${datePrefix}T${etTime}`;
    const dNum=(new Date(et).getTime()-new Date(st).getTime())/3600000;
    const ref=doc(db,"items",uid);const snap=await getDoc(ref);

    const it=snap.data();
    await addDoc(collection(db,"bookings"),{itemId:it.itemId,itemName:it.name,itemType:it.type,studentId:currentUser.studentId,studentName:currentUser.fullName,yearOfStudy:currentUser.yearOfStudy,startTime:st,endTime:et,duration:dNum,status:"Active",createdAt:serverTimestamp()});
    await updateDoc(ref,{status:"Borrowed"});

    document.getElementById("bookingModal").remove();renderItemsGrouped();toast("จองสำเร็จ! 🎉")
  }catch(err){console.error(err);btn.disabled=false;btn.innerHTML="ยืนยันการยืม";toast("บันทึกไม่สำเร็จ: "+err.message,"error",5000)}
}

          </div>
          <div class="flex items-center gap-2 sm:flex-col sm:items-end">
            <span class="text-xs px-3 py-1.5 rounded-full font-semibold bg-orange-100 text-orange-700">✓ เบิกแล้ว</span>
          </div>
        </div>`;
      }
      const ret=b.status==="Returned";
      return `<div class="glass rounded-2xl p-4 lg:p-5 card-shadow flex flex-col sm:flex-row sm:items-center gap-4">
        <div class="flex items-center gap-4 flex-1 min-w-0">
          <div class="w-16 h-16 lg:w-20 lg:h-20 rounded-2xl bg-gradient-to-br ${colorClass} flex items-center justify-center p-2.5 icon-wrap flex-shrink-0 shadow-inner">${getIcon(b.itemType)}</div>
          <div class="flex-1 min-w-0">
            <h3 class="font-bold text-slate-800 text-base lg:text-lg truncate">${esc(b.itemName)}</h3>
            <p class="text-xs text-slate-500 font-mono">${esc(b.itemId)}</p>
            <p class="text-xs text-slate-600 mt-1.5 flex items-center gap-1"><span>🕐</span>${esc(fmtDate(b.startTime))} → ${esc(fmtDate(b.endTime))}</p>
          </div>
        </div>
        <div class="flex items-center gap-2 sm:flex-col sm:items-end">
          <span class="text-xs px-3 py-1.5 rounded-full font-semibold ${ret?'bg-emerald-100 text-emerald-700':'bg-amber-100 text-amber-700'}">${ret?'✓ คืนแล้ว':'● กำลังยืม'}</span>
          ${ret?'':`<button data-bid="${b.id}" data-iid="${b.itemId}" class="return-btn-trigger return-btn text-white text-xs font-bold px-4 py-2 rounded-xl flex items-center gap-1.5"><span>↩</span>คืนอุปกรณ์</button>`}
        </div>
      </div>`;
    }).join("");
    document.querySelectorAll(".return-btn-trigger").forEach(btn=>btn.addEventListener("click",()=>returnItem(btn.dataset.bid,btn.dataset.iid,btn)));
  }catch(err){console.error(err);document.getElementById("bookingsList").innerHTML=`<div class="glass rounded-2xl p-8 text-center text-red-500">❌ โหลดไม่สำเร็จ<br><span class="text-xs text-slate-500 mt-2 block">${esc(err.message)}</span></div>`}
}
async function returnItem(bookingId,itemId,btn){
  if(!confirm("ยืนยันการคืนอุปกรณ์นี้?"))return;
  btn.disabled=true;btn.innerHTML='<span class="spinner"></span>';
  try{
    await updateDoc(doc(db,"bookings",bookingId),{status:"Returned",returnedAt:serverTimestamp()});
    const itemDocId=itemsCache.find(i=>i.itemId===itemId)?.id||itemId;
    await updateDoc(doc(db,"items",itemDocId),{status:"Available"});
    const idx=itemsCache.findIndex(i=>i.itemId===itemId);
    if(idx!==-1)itemsCache[idx].status="Available";
    toast("คืนอุปกรณ์สำเร็จ ✓","success");
    await renderMyBookings();
  }catch(err){console.error(err);btn.disabled=false;btn.innerHTML='<span>↩</span>คืนอุปกรณ์';toast("คืนไม่สำเร็จ: "+err.message,"error",5000)}
}
function fmtDate(s){if(!s)return"-";const d=new Date(s);const p=n=>String(n).padStart(2,"0");return `${p(d.getDate())}/${p(d.getMonth()+1)} ${p(d.getHours())}:${p(d.getMinutes())}`}
function renderRules(){document.getElementById("mainContent").innerHTML=`<div class="glass rounded-3xl card-shadow p-6 mb-6"><h1 class="text-2xl lg:text-3xl font-bold text-slate-800">📜 กฎและข้อตกลง</h1><p class="text-slate-500 mt-1">โปรดอ่านก่อนใช้บริการ</p></div><div class="glass rounded-2xl p-8 card-shadow space-y-4 text-slate-700"><div class="flex gap-3"><span class="text-rose-500 font-bold">1.</span><p>ผู้ยืมต้องเป็นนักศึกษาวิทยาลัยสหวิทยาการเท่านั้น</p></div><div class="flex gap-3"><span class="text-rose-500 font-bold">2.</span><p>ยืมอุปกรณ์ได้เฉพาะช่วงเวลา <strong>08:00 - 17:00</strong> ของแต่ละวัน</p></div><div class="flex gap-3"><span class="text-rose-500 font-bold">3.</span><p>วัสดุสิ้นเปลือง (กระดาษ A4, ไส้แม็ก, คลิปหนีบกระดาษ) เป็นการเบิกใช้ ไม่ต้องคืน</p></div><div class="flex gap-3"><span class="text-rose-500 font-bold">4.</span><p>กรุณาดูแลรักษาอุปกรณ์ และคืนตามเวลาที่กำหนด</p></div><div class="flex gap-3"><span class="text-rose-500 font-bold">5.</span><p>หากอุปกรณ์ชำรุด สูญหาย ผู้ยืมต้องรับผิดชอบ</p></div><div class="flex gap-3"><span class="text-rose-500 font-bold">6.</span><p>การคืนอุปกรณ์ล่าช้าจะถูกระงับสิทธิ์การยืม</p></div></div>`}
if(document.readyState==="loading")document.addEventListener("DOMContentLoaded",init);else init();
</script>
