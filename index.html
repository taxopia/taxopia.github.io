<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TAXOPIA - หน้าแรก</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;800;900&display=swap');

        body {
            margin: 0;
            overflow: hidden;
            background-color: #020617;
            font-family: Kanit, sans-serif;
            color: #ffffff;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .bg-cyber-grid {
            background-size: 80px 80px;
            background-image:
                radial-gradient(circle at center, rgba(56, 189, 248, 0.1) 1px, transparent 2px),
                linear-gradient(to right, rgba(255, 255, 255, 0.08) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.08) 1px, transparent 1px);
        }

        .perspective-container {
            perspective: 1000px;
            transform-style: preserve-3d;
        }

        .perspective-grid {
            transform: rotateX(60deg) translateY(0);
            animation: grid-march 10s linear infinite;
        }

        @keyframes grid-march {
            0% { transform: rotateX(60deg) translateY(0); }
            100% { transform: rotateX(60deg) translateY(80px); }
        }

        .aurora-bg {
            background: linear-gradient(60deg, rgba(79,70,229,0.25), rgba(236,72,153,0.25), rgba(234,179,8,0.25), rgba(6,182,212,0.25));
            background: -webkit-linear-gradient(60deg, rgba(79,70,229,0.25), rgba(236,72,153,0.25), rgba(234,179,8,0.25), rgba(6,182,212,0.25));
            background-size: 300% 300%;
            animation: aurora-shift 20s ease infinite;
            filter: blur(100px);
        }

        @keyframes aurora-shift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .ambient-particles {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(circle, rgba(255,255,255,0.15) 2px, transparent 2px);
            background-size: 120px 120px;
            animation: float-particles 20s linear infinite;
            pointer-events: none;
        }

        @keyframes float-particles {
            0% { transform: translateY(0) scale(1); opacity: 0.2; }
            50% { transform: translateY(-60px) scale(1.3); opacity: 0.6; }
            100% { transform: translateY(-120px) scale(1); opacity: 0.2; }
        }

        .holo-ring-container {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) rotateX(60deg);
            width: 200vmin; height: 200vmin;
            pointer-events: none;
            z-index: 0;
            opacity: 0.15;
        }
        
        .holo-ring-inner {
            position: absolute; inset: 0; border-radius: 50%;
            border: 2px dashed #38bdf8;
            animation: spin 60s linear infinite;
        }

        .holo-ring-outer {
            position: absolute; inset: -20vmin; border-radius: 50%;
            border: 1px solid #c084fc;
            animation: spin-reverse 90s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes spin-reverse { 100% { transform: rotate(-360deg); } }

        .data-stream {
            position: absolute;
            top: -100%;
            width: 1px;
            height: 150px;
            background: linear-gradient(to bottom, transparent, rgba(251, 191, 36, 0.8), transparent);
            animation: data-fall linear infinite;
        }

        @keyframes data-fall {
            0% { transform: translateY(-100px); opacity: 0; }
            50% { opacity: 0.5; }
            100% { transform: translateY(150vh); opacity: 0; }
        }

        .glass-panel {
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.85) 0%, rgba(0, 0, 0, 0.95) 100%);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 1), inset 0 0 20px rgba(255, 255, 255, 0.03);
        }

        .text-glow-gold {
            background: linear-gradient(180deg, #fffbeb 0%, #fde68a 50%, #d97706 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 60px rgba(245, 158, 11, 0.7);
        }

        .glow-button {
            position: relative;
            overflow: hidden;
        }
        
        .glow-button::after {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.4) 0%, transparent 60%);
            opacity: 0; transition: opacity 0.3s;
        }
        
        .glow-button:hover::after { opacity: 1; }
    </style>
</head>

                    <div class="flex -space-x-3 md:-space-x-2.5 mb-2 md:mb-6 group-hover:scale-110 transition-transform">

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAYOYjBUlf7n5PF5aNsn0pIE78qu7kZmDc",
            authDomain: "taxopia-8e165.firebaseapp.com",
            databaseURL: "https://taxopia-8e165-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "taxopia-8e165",
            storageBucket: "taxopia-8e165.firebasestorage.app",
            messagingSenderId: "579124241021",
            appId: "1:579124241021:web:339058cab95ec682ea0714",
            measurementId: "G-HE09N93JMJ"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const SystemController = {
            showSetup() {
                const h = document.getElementById('screen-home');
                h.classList.add('opacity-0');
                setTimeout(() => {
                    h.classList.add('hidden');
                    const setup = document.getElementById('screen-setup');
                    setup.classList.remove('hidden');
                }, 1000);
            },
            
            async createRoom(num) {
                const playerName = document.getElementById('player-name-input').value.trim();
                
                if (!playerName) {
                    alert('ข้อผิดพลาดทางไวยากรณ์ กรุณาระบุชื่อประจำตัวของคุณก่อนทำการสร้างห้องปฏิบัติการ');
                    return;
                }

                try {
                    const roomId = Math.floor(100000 + Math.random() * 900000).toString();
                    
                    const initialPlayers = {};
                    initialPlayers[1] = { name: playerName };

                    await db.ref('rooms/' + roomId).set({
                        playerCount: num,
                        currentTurn: 1,
                        gameState: 'lobby',
                        playersJoined: 1,
                        hostId: 1,
                        players: initialPlayers
                    });
                    
                    localStorage.setItem('taxopia_room_id', roomId);
                    localStorage.setItem('taxopia_players', num);
                    localStorage.setItem('taxopia_my_id', '1');
                    localStorage.setItem('taxopia_player_name', playerName);
                    
                    window.location.href = 'game.html';
                } catch (error) {
                    alert('ข้อผิดพลาดทางเครือข่าย การพยายามเชื่อมต่อศูนย์ข้อมูลล้มเหลว กรุณาตรวจสอบสัญญาณอินเทอร์เน็ตของท่าน');
                }
            },
            
            async joinRoom() {
                const playerName = document.getElementById('player-name-input').value.trim();
                const roomIdInput = document.getElementById('join-room-id').value.trim();
                
                if (!playerName) {
                    alert('ข้อผิดพลาดทางไวยากรณ์ กรุณาระบุชื่อประจำตัวของคุณก่อนทำการเข้าร่วมห้อง');
                    return;
                }

                if(!roomIdInput || roomIdInput.length !== 6) {
                    alert('ข้อผิดพลาดทางไวยากรณ์ กรุณาระบุรหัสผ่านห้องจำนวน 6 หลักให้ครบถ้วนสมบูรณ์');
                    return;
                }
                
                try {
                    const snapshot = await db.ref('rooms/' + roomIdInput).once('value');
                    if (snapshot.exists()) {
                        const data = snapshot.val();
                        
                        if (data.gameState !== 'lobby' && data.gameState !== 'waiting') {
                            alert('ข้อผิดพลาดทางสถานะ ห้องปฏิบัติการนี้ได้เริ่มการแข่งขันไปแล้ว ไม่สามารถเข้าร่วมแทรกแซงได้');
                            return;
                        }

                        if (data.playersJoined >= data.playerCount) {
                            alert('ข้อผิดพลาดทางพื้นที่ จำนวนผู้เล่นในห้องปฏิบัติการนี้ถึงขีดจำกัดสูงสุดแล้ว ไม่สามารถลงทะเบียนเพิ่มเติมได้');
                            return;
                        }
                        
                        const myNewId = data.playersJoined + 1;
                        
                        const updates = {};
                        updates['/playersJoined'] = myNewId;
                        updates['/players/' + myNewId] = { name: playerName };
                        
                        await db.ref('rooms/' + roomIdInput).update(updates);
                        
                        localStorage.setItem('taxopia_room_id', roomIdInput);
                        localStorage.setItem('taxopia_players', data.playerCount);
                        localStorage.setItem('taxopia_my_id', myNewId.toString());
                        localStorage.setItem('taxopia_player_name', playerName);
                        
                        window.location.href = 'game.html';
                    } else {
                        alert('ข้อผิดพลาดในการตรวจสอบ ไม่พบพิกัดของห้องปฏิบัติการนี้ในระบบฐานข้อมูลส่วนกลาง');
                    }
                } catch (error) {
                    console.error(error);
                    alert('ข้อผิดพลาดขั้นวิกฤต กระบวนการดึงข้อมูลจากศูนย์กลางเกิดการขัดข้อง');
                }
            },

            initDynamicBackground() {
                const wrapper = document.getElementById('data-streams-wrapper');
                if(!wrapper) return;
                
                for(let i=0; i<20; i++) {
                    const stream = document.createElement('div');
                    stream.className = 'data-stream';
                    stream.style.left = `${Math.random() * 100}%`;
                    stream.style.animationDuration = `${Math.random() * 4 + 3}s`;
                    stream.style.animationDelay = `${Math.random() * 5}s`;
                    wrapper.appendChild(stream);
                }
            }
        };

        window.addEventListener('DOMContentLoaded', () => {
            SystemController.initDynamicBackground();
        });
    </script>
</body>
</html>
