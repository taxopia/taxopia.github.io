                if (!playerName) {
                    alert('กรุณาระบุชื่อของคุณก่อนเข้าเล่น');

                    const initialPlayers = {};
                    initialPlayers[1] = { name: playerName };

                    await db.ref('rooms/' + roomId).set({
                        playerCount: num,
                        currentTurn: 1,
                        gameState: 'lobby',
                        playersJoined: 1,
                        hostId: 1,
                        players: initialPlayers
                    });
                    
                    localStorage.setItem('taxopia_room_id', roomId);
                    localStorage.setItem('taxopia_players', num);
                    localStorage.setItem('taxopia_my_id', '1');
                    localStorage.setItem('taxopia_player_name', playerName);
                    
                    window.location.href = 'game.html';
                } catch (error) {
                    alert('ข้อผิดพลาดทางเครือข่าย การพยายามเชื่อมต่อศูนย์ข้อมูลล้มเหลว กรุณาตรวจสอบสัญญาณอินเทอร์เน็ตของท่าน');
                }
            },
            
            async joinRoom() {
                const playerName = document.getElementById('player-name-input').value.trim();
                const roomIdInput = document.getElementById('join-room-id').value.trim();
                
                if (!playerName) {
                    alert('กรุณาระบุชื่อของคุณก่อนเข้าเล่น');
                    return;
                }

                if(!roomIdInput || roomIdInput.length !== 6) {
                    alert('กรุณาระบุเลขห้องจำนวน 6 หลัก');
                    return;
                }
                
                try {
                    const snapshot = await db.ref('rooms/' + roomIdInput).once('value');
                    if (snapshot.exists()) {
                        const data = snapshot.val();
                        
                        if (data.gameState !== 'lobby' && data.gameState !== 'waiting') {
                            alert('ห้องนี้ได้เริ่มการแข่งขันไปแล้ว ไม่สามารถเข้าร่วมแทรกแซงได้');
                            return;
                        }

                        if (data.playersJoined >= data.playerCount) {
                            alert('ข้อผิดพลาดทางพื้นที่ จำนวนผู้เล่นในห้องนี้ถึงขีดจำกัดสูงสุดแล้ว ไม่สามารถเข้าร่วมเพิ่มเติมได้');
                            return;
                        }
                        
                        const myNewId = data.playersJoined + 1;
                        
                        const updates = {};
                        updates['/playersJoined'] = myNewId;
                        updates['/players/' + myNewId] = { name: playerName };
                        
                        await db.ref('rooms/' + roomIdInput).update(updates);
                        
                        localStorage.setItem('taxopia_room_id', roomIdInput);
                        localStorage.setItem('taxopia_players', data.playerCount);
                        localStorage.setItem('taxopia_my_id', myNewId.toString());
                        localStorage.setItem('taxopia_player_name', playerName);
                        
                        window.location.href = 'game.html';
                    } else {
                        alert('ไม่พบห้องนี้ในระบบฐานข้อมูล โปรดตรวจสอบเลขห้องให้ดีก่อนกดเข้าร่วม');
                    }
                } catch (error) {
                    console.error(error);
                    alert('ข้อผิดพลาดขั้นวิกฤต กระบวนการดึงข้อมูลจากศูนย์กลางเกิดการขัดข้อง');
                }
            }
        };

        window.addEventListener('DOMContentLoaded', () => {
            const userAgentData = navigator.userAgent || navigator.vendor || window.opera;
            
            const isLineBrowser = userAgentData.indexOf('Line') > -1;
            const isInstagramBrowser = userAgentData.indexOf('Instagram') > -1;
            const isFacebookBrowser = userAgentData.indexOf('FBAN') > -1 || userAgentData.indexOf('FBAV') > -1;

            if (isLineBrowser || isInstagramBrowser || isFacebookBrowser) {
                
                const blockerScreenOverlay = document.createElement('div');
                blockerScreenOverlay.className = 'fixed inset-0 z-[9999] flex flex-col items-center justify-center bg-sky-950/90 backdrop-blur-md px-6';
                
                blockerScreenOverlay.innerHTML = `
                    <div class="bg-white border-[6px] border-rose-300 rounded-[2rem] p-8 max-w-lg w-full text-center shadow-[0_20px_50px_rgba(0,0,0,0.3)]">
                        <div class="w-20 h-20 bg-rose-100 rounded-full flex items-center justify-center mx-auto mb-6 border-4 border-rose-300 shadow-[0_6px_0_#fda4af]">
                            <span class="text-rose-500 font-black text-4xl">!</span>
                        </div>
                        <h2 class="text-2xl md:text-3xl font-black text-rose-500 mb-4 tracking-wide">ระบบต้องการเบราว์เซอร์หลัก</h2>
                        <p class="text-base text-slate-600 mb-8 leading-relaxed font-bold">
                            ระบบได้ตรวจจับการการเปิดใน IG, Line และเพื่อป้องกันข้อมูลสูญหายและให้ระบบของ TAXOPIA ทำงานได้อย่างสมบูรณ์ที่สุด
                            โปรดกดที่ ไอคอนจุดสามจุด บริเวณมุมหน้าจอ และเลือกคำสั่ง เปิดในเบราว์เซอร์ หรือ Open in Browser
                        </p>
                        <div class="animate-pulse text-sky-500 font-black tracking-widest text-sm bg-sky-50 px-4 py-2 rounded-full border-2 border-sky-200 inline-block">
                            กรุณาดำเนินการตามคำแนะนำด้านบน
                        </div>
                    </div>
                `;
                
                document.body.appendChild(blockerScreenOverlay);
                document.body.style.overflow = 'hidden';
            }
        });
    </script>
</body>
</html>
