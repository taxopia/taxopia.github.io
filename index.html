<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TAXOPIA - หน้าแรกเริ่ม</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;800;900&display=swap');

        body {
            margin: 0;
            overflow: hidden;
            background-color: #020617;
            font-family: Kanit, sans-serif;
            color: #ffffff;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .bg-cyber-grid {
            background-size: 80px 80px;
            background-image:
                linear-gradient(to right, rgba(255, 255, 255, 0.08) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.08) 1px, transparent 1px);
        }

        .perspective-container {
            perspective: 1000px;
            transform-style: preserve-3d;
        }

        .perspective-grid {
            transform: rotateX(60deg) translateY(0);
            animation: grid-march 10s linear infinite;
        }

        @keyframes grid-march {
            0% { transform: rotateX(60deg) translateY(0); }
            100% { transform: rotateX(60deg) translateY(80px); }
        }

        .aurora-bg {
            background: linear-gradient(60deg, rgba(79,70,229,0.25), rgba(236,72,153,0.25), rgba(234,179,8,0.25), rgba(6,182,212,0.25));
            background: -webkit-linear-gradient(60deg, rgba(79,70,229,0.25), rgba(236,72,153,0.25), rgba(234,179,8,0.25), rgba(6,182,212,0.25));
            background-size: 300% 300%;
            animation: aurora-shift 20s ease infinite;
            filter: blur(100px);
        }

        @keyframes aurora-shift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .ambient-particles {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(circle, rgba(255,255,255,0.15) 2px, transparent 2px);
            background-size: 120px 120px;
            animation: float-particles 20s linear infinite;
            pointer-events: none;
        }

        @keyframes float-particles {
            0% { transform: translateY(0) scale(1); opacity: 0.2; }
            50% { transform: translateY(-60px) scale(1.3); opacity: 0.6; }
            100% { transform: translateY(-120px) scale(1); opacity: 0.2; }
        }

        .glass-panel {
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.85) 0%, rgba(0, 0, 0, 0.95) 100%);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 1), inset 0 0 20px rgba(255, 255, 255, 0.03);
        }

        .text-glow-gold {
            background: linear-gradient(180deg, #fffbeb 0%, #fde68a 50%, #d97706 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 60px rgba(245, 158, 11, 0.7);
        }

        .glow-button {
            position: relative;
            overflow: hidden;
        }
        
        .glow-button::after {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.4) 0%, transparent 60%);
            opacity: 0; transition: opacity 0.3s;
        }
        
        .glow-button:hover::after { opacity: 1; }
    </style>
</head>
<body class="w-[100dvw] h-[100dvh] flex flex-col relative select-none bg-slate-950 overflow-hidden">

    <div id="screen-home" class="absolute inset-0 z-[200] flex flex-col items-center justify-center bg-[#020617] transition-opacity duration-1000 overflow-hidden">
        
        <div class="absolute inset-0 aurora-bg mix-blend-screen pointer-events-none"></div>
        
        <div class="absolute inset-0 perspective-container pointer-events-none opacity-40">
            <div class="absolute w-[200%] h-[200%] left-[-50%] top-[-20%] bg-cyber-grid perspective-grid"></div>
        </div>
        
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[80vmin] h-[80vmin] border-[3px] border-amber-500/15 rounded-full animate-[spin_45s_linear_infinite] pointer-events-none shadow-[0_0_80px_rgba(245,158,11,0.1)]"></div>
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[65vmin] h-[65vmin] border-[2px] border-dashed border-cyan-500/20 rounded-full animate-[spin_35s_linear_infinite_reverse] pointer-events-none"></div>
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[100vmin] h-[100vmin] border-[2px] border-emerald-500/10 rounded-full animate-[spin_60s_linear_infinite] pointer-events-none"></div>

        <div class="ambient-particles pointer-events-none"></div>
        <div class="ambient-particles pointer-events-none" style="animation-duration: 35s; background-size: 160px 160px; opacity: 0.15;"></div>
        
        <div class="relative z-10 text-center flex flex-col items-center w-full max-w-7xl px-4">
            <h1 class="text-6xl md:text-[8rem] lg:text-[10rem] font-black text-glow-gold mb-4 md:mb-6 tracking-wide drop-shadow-[0_20px_50px_rgba(0,0,0,1)]">TAXOPIA</h1>
            <p class="text-xl md:text-4xl lg:text-5xl text-amber-200 font-bold tracking-wide mb-16 md:mb-24 drop-shadow-2xl bg-black/50 px-6 py-3 md:px-10 md:py-4 rounded-full border-2 border-amber-500/40 backdrop-blur-md shadow-[0_0_40px_rgba(245,158,11,0.2)]">เกมเศรษฐี ภาษีมหัศจรรย์</p>
            
            <div class="flex flex-col md:flex-row items-center justify-center gap-6 md:gap-12 w-full px-4">
                
                <button onclick="location.href='information.html'" class="px-8 py-4 md:px-10 md:py-5 rounded-[2rem] border-2 border-slate-300 text-slate-100 bg-slate-800/60 font-bold text-lg md:text-2xl tracking-wide hover:bg-slate-700/80 hover:scale-105 active:scale-95 transition-all shadow-[0_0_30px_rgba(255,255,255,0.15)] backdrop-blur-xl glow-button w-full md:w-auto">
                    อ่านความรู้เรื่องภาษี
                </button>

                <button onclick="SystemController.showSetup()" class="relative group px-16 py-6 md:px-20 md:py-8 rounded-[3rem] bg-gradient-to-b from-amber-400 to-amber-600 font-bold text-3xl md:text-5xl text-black shadow-[0_0_80px_rgba(245,158,11,0.9)] hover:scale-110 active:scale-95 transition-all duration-300 glow-button z-20 w-full md:w-auto border-4 border-amber-300">
                    <div class="absolute inset-0 rounded-[2.8rem] border-[4px] border-white/60 group-hover:animate-ping opacity-70"></div>
                    เริ่มเกม
                </button>

                <button onclick="location.href='howto.html'" class="px-8 py-4 md:px-10 md:py-5 rounded-[2rem] border-2 border-slate-300 text-slate-100 bg-slate-800/60 font-bold text-lg md:text-2xl tracking-wide hover:bg-slate-700/80 hover:scale-105 active:scale-95 transition-all shadow-[0_0_30px_rgba(255,255,255,0.15)] backdrop-blur-xl glow-button w-full md:w-auto">
                    คู่มือการเล่นเกม
                </button>

            </div>
        </div>
    </div>

    <div id="screen-setup" class="absolute inset-0 z-[150] hidden flex flex-col items-center justify-center bg-black/95 backdrop-blur-3xl transition-opacity duration-1000 overflow-hidden p-4 md:p-8">
        
        <div class="glass-panel w-full max-w-7xl h-auto max-h-[95dvh] md:max-h-full p-6 md:p-16 rounded-[2rem] md:rounded-[3rem] flex flex-col items-center border-amber-500/60 relative overflow-hidden shadow-[0_30px_80px_rgba(0,0,0,1)]">
            <div class="absolute top-0 left-0 w-full h-3 bg-gradient-to-r from-transparent via-amber-500 to-transparent"></div>
            
            <h2 class="text-2xl md:text-5xl lg:text-7xl font-bold text-white mb-6 md:mb-12 tracking-wide text-center drop-shadow-2xl shrink-0">กำหนดจำนวนผู้เล่น</h2>
            
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-3 md:gap-10 w-full mb-6 md:mb-12 overflow-hidden">
                
                <button onclick="SystemController.startGame(1)" class="bg-slate-900/90 border-4 border-slate-700 hover:border-blue-500 hover:bg-slate-800 p-3 md:p-12 rounded-[1.5rem] md:rounded-[2.5rem] flex flex-col items-center justify-center transition-all group shadow-[0_20px_50px_rgba(0,0,0,0.8)] w-full md:min-h-[300px]">
                    <div class="w-12 h-12 md:w-28 md:h-28 rounded-full bg-gradient-to-br from-blue-700 to-blue-900 border-[3px] md:border-[5px] border-blue-400 flex items-center justify-center text-xl md:text-6xl font-bold mb-2 md:mb-10 group-hover:scale-110 transition-transform shadow-[0_0_30px_#60a5fa]">1</div>
                    <span class="font-bold text-lg md:text-3xl text-slate-300 group-hover:text-white tracking-wide">เล่นหนึ่งคน</span>
                </button>
                
                <button onclick="SystemController.startGame(2)" class="bg-slate-900/90 border-4 border-slate-700 hover:border-rose-500 hover:bg-slate-800 p-3 md:p-12 rounded-[1.5rem] md:rounded-[2.5rem] flex flex-col items-center justify-center transition-all group shadow-[0_20px_50px_rgba(0,0,0,0.8)] w-full md:min-h-[300px]">
                    <div class="flex -space-x-3 md:-space-x-8 mb-2 md:mb-10 group-hover:scale-110 transition-transform">
                        <div class="w-10 h-10 md:w-24 md:h-24 rounded-full bg-gradient-to-br from-blue-700 to-blue-900 border-[3px] md:border-[5px] border-slate-800 flex items-center justify-center text-lg md:text-5xl font-bold z-20 shadow-[0_0_20px_#60a5fa]">1</div>
                        <div class="w-10 h-10 md:w-24 md:h-24 rounded-full bg-gradient-to-br from-rose-700 to-rose-900 border-[3px] md:border-[5px] border-slate-800 flex items-center justify-center text-lg md:text-5xl font-bold z-10 shadow-[0_0_20px_#fb7185]">2</div>
                    </div>
                    <span class="font-bold text-lg md:text-3xl text-slate-300 group-hover:text-white tracking-wide">เล่นสองคน</span>
                </button>
                
                <button onclick="SystemController.startGame(3)" class="bg-slate-900/90 border-4 border-slate-700 hover:border-emerald-500 hover:bg-slate-800 p-3 md:p-12 rounded-[1.5rem] md:rounded-[2.5rem] flex flex-col items-center justify-center transition-all group shadow-[0_20px_50px_rgba(0,0,0,0.8)] w-full md:min-h-[300px]">
                    <div class="flex -space-x-3 md:-space-x-6 mb-2 md:mb-10 group-hover:scale-110 transition-transform">
                        <div class="w-9 h-9 md:w-20 md:h-20 rounded-full bg-gradient-to-br from-blue-700 to-blue-900 border-[2px] md:border-[4px] border-slate-800 flex items-center justify-center text-base md:text-4xl font-bold z-30 shadow-[0_0_15px_#60a5fa]">1</div>
                        <div class="w-9 h-9 md:w-20 md:h-20 rounded-full bg-gradient-to-br from-rose-700 to-rose-900 border-[2px] md:border-[4px] border-slate-800 flex items-center justify-center text-base md:text-4xl font-bold z-20 shadow-[0_0_15px_#fb7185]">2</div>
                        <div class="w-9 h-9 md:w-20 md:h-20 rounded-full bg-gradient-to-br from-emerald-700 to-emerald-900 border-[2px] md:border-[4px] border-slate-800 flex items-center justify-center text-base md:text-4xl font-bold z-10 shadow-[0_0_15px_#34d399]">3</div>
                    </div>
                    <span class="font-bold text-lg md:text-3xl text-slate-300 group-hover:text-white tracking-wide">เล่นสามคน</span>
                </button>
                
                <button onclick="SystemController.startGame(4)" class="bg-slate-900/90 border-4 border-slate-700 hover:border-amber-500 hover:bg-slate-800 p-3 md:p-12 rounded-[1.5rem] md:rounded-[2.5rem] flex flex-col items-center justify-center transition-all group shadow-[0_20px_50px_rgba(0,0,0,0.8)] w-full md:min-h-[300px]">
                    <div class="flex -space-x-2 md:-space-x-5 mb-2 md:mb-10 group-hover:scale-110 transition-transform">
                        <div class="w-8 h-8 md:w-16 md:h-16 rounded-full bg-gradient-to-br from-blue-700 to-blue-900 border-[2px] md:border-[3px] border-slate-800 flex items-center justify-center text-sm md:text-3xl font-bold z-40 shadow-[0_0_15px_#60a5fa]">1</div>
                        <div class="w-8 h-8 md:w-16 md:h-16 rounded-full bg-gradient-to-br from-rose-700 to-rose-900 border-[2px] md:border-[3px] border-slate-800 flex items-center justify-center text-sm md:text-3xl font-bold z-30 shadow-[0_0_15px_#fb7185]">2</div>
                        <div class="w-8 h-8 md:w-16 md:h-16 rounded-full bg-gradient-to-br from-emerald-700 to-emerald-900 border-[2px] md:border-[3px] border-slate-800 flex items-center justify-center text-sm md:text-3xl font-bold z-20 shadow-[0_0_15px_#34d399]">3</div>
                        <div class="w-8 h-8 md:w-16 md:h-16 rounded-full bg-gradient-to-br from-amber-700 to-amber-900 border-[2px] md:border-[3px] border-slate-800 flex items-center justify-center text-sm md:text-3xl font-bold z-10 shadow-[0_0_15px_#fbbf24]">4</div>
                    </div>
                    <span class="font-bold text-lg md:text-3xl text-slate-300 group-hover:text-white tracking-wide">เล่นสี่คน</span>
                </button>
            </div>
            
            <button onclick="location.reload()" class="text-slate-400 text-sm md:text-2xl font-bold underline hover:text-white transition-colors tracking-wide shrink-0">ยกเลิกคำสั่งและย้อนกลับสู่หน้าหลัก</button>
        </div>
    </div>

    <script>
        const SystemController = {
            showSetup() {
                const h = document.getElementById('screen-home');
                h.classList.add('opacity-0');
                setTimeout(() => {
                    h.classList.add('hidden');
                    const setup = document.getElementById('screen-setup');
                    setup.classList.remove('hidden');
                }, 1000);
            },
            startGame(num) {
                localStorage.setItem('taxopia_players', num);
                window.location.href = 'game.html';
            }
        };
    </script>
</body>
</html>
