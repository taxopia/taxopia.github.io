  @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  @keyframes scaleIn{from{opacity:0;transform:scale(0.94)}to{opacity:1;transform:scale(1)}}
  @keyframes spin{to{transform:rotate(360deg)}}
  .animate-fade{animation:fadeIn 0.4s ease-out}
  .animate-scale{animation:scaleIn 0.25s ease-out}
  .spinner{display:inline-block;width:18px;height:18px;border:2px solid rgba(255,255,255,0.4);border-top-color:white;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle}
  .blob{position:fixed;border-radius:50%;filter:blur(80px);opacity:0.35;z-index:-1;pointer-events:none}
  .blob1{width:400px;height:400px;background:#fda4af;top:-100px;right:-100px}
  .blob2{width:350px;height:350px;background:#a5f3fc;bottom:-100px;left:-100px}
  ::-webkit-scrollbar{width:8px;height:8px}::-webkit-scrollbar-thumb{background:#f43f5e;border-radius:10px}
  .toast{position:fixed;top:20px;right:20px;z-index:9999;max-width:90vw}
  .tab-btn{transition:all 0.2s ease;white-space:nowrap}
  .tab-btn.active{background:linear-gradient(135deg,#f43f5e 0%,#ec4899 100%);color:white;box-shadow:0 6px 16px -4px rgba(244,63,94,0.45)}
  .chip{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:600}
  .input{width:100%;padding:10px 14px;border-radius:12px;background:rgba(255,255,255,0.75);border:1px solid rgba(255,255,255,0.9);outline:none;transition:all 0.2s}
  .input:focus{border-color:#f43f5e;box-shadow:0 0 0 3px rgba(244,63,94,0.15)}
  .btn{padding:10px 16px;border-radius:12px;font-weight:600;transition:all 0.2s;display:inline-flex;align-items:center;gap:6px;justify-content:center}
  .btn-primary{background:linear-gradient(135deg,#f43f5e,#ec4899);color:#fff}
  .btn-primary:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 8px 18px -4px rgba(244,63,94,0.45)}
  .btn-secondary{background:rgba(255,255,255,0.8);color:#334155}
  .btn-secondary:hover{background:#fff}
  .btn-danger{background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff}
  .btn-danger:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 8px 18px -4px rgba(220,38,38,0.45)}
  .btn-success{background:linear-gradient(135deg,#10b981,#059669);color:#fff}
  .btn-success:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 8px 18px -4px rgba(5,150,105,0.45)}
  .btn-xs{padding:6px 10px;font-size:12px;border-radius:10px}
  .tbl{width:100%;border-collapse:separate;border-spacing:0}
  .tbl th{text-align:left;padding:12px;font-size:12px;font-weight:700;color:#64748b;background:rgba(255,255,255,0.5);position:sticky;top:0}
  .tbl td{padding:12px;border-top:1px solid rgba(226,232,240,0.6);font-size:14px;color:#334155;vertical-align:middle}
  .tbl tr:hover td{background:rgba(255,255,255,0.4)}
  .section-title{font-size:20px;font-weight:700;color:#1e293b;display:flex;align-items:center;gap:10px}
  @media (max-width:768px){
    .tbl thead{display:none}
    .tbl tr{display:block;border-radius:14px;background:rgba(255,255,255,0.6);margin-bottom:10px;padding:10px}
    .tbl td{display:flex;justify-content:space-between;gap:10px;border:none;padding:6px 4px;font-size:13px}
    .tbl td::before{content:attr(data-label);font-weight:700;color:#64748b;font-size:12px}
  }
</style>

function toast(msg,type="success",dur=3000){const c={success:"from-emerald-500 to-teal-500",error:"from-red-500 to-rose-500",info:"from-blue-500 to-indigo-500",warn:"from-amber-500 to-orange-500"};const t=document.createElement("div");t.className="toast glass-dark rounded-2xl px-5 py-3 card-shadow flex items-center gap-3 animate-fade";t.innerHTML=`<div class="w-2 h-10 rounded-full bg-gradient-to-b ${c[type]||c.info}"></div><span class="font-medium text-slate-700">${msg}</span>`;document.body.appendChild(t);setTimeout(()=>{t.style.opacity="0";t.style.transition="opacity 0.3s";setTimeout(()=>t.remove(),300)},dur)}
function esc(s){if(s==null)return"";return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]))}
function fmtDate(s){if(!s)return"-";const d=new Date(s);if(isNaN(d))return"-";const p=n=>String(n).padStart(2,"0");return `${p(d.getDate())}/${p(d.getMonth()+1)} ${p(d.getHours())}:${p(d.getMinutes())}`}
function fmtTs(t){if(!t)return"-";try{return fmtDate(new Date(t.seconds*1000).toISOString())}catch{return"-"}}

async function loadAll(){if(!db){toast("Firebase ไม่พร้อม","error");return}try{const[a,b,c,r]=await Promise.all([getDocs(collection(db,"items")),getDocs(collection(db,"bookings")),getDocs(collection(db,"users")),getDocs(collection(db,"year1_roster"))]);items=a.docs.map(d=>({id:d.id,...d.data()}));bookings=b.docs.map(d=>({id:d.id,...d.data()}));bookings.sort((x,y)=>(y.createdAt?.seconds||0)-(x.createdAt?.seconds||0));users=c.docs.map(d=>({id:d.id,...d.data()}));roster=r.docs.map(d=>({id:d.id,...d.data()})).sort((x,y)=>(x.studentId||"").localeCompare(y.studentId||""))}catch(e){console.error(e);toast("โหลดข้อมูลไม่สำเร็จ","error")}}
function navigate(tab){currentTab=tab;document.querySelectorAll(".tab-btn").forEach(b=>{if(b.dataset.tab===tab){b.classList.add("active");b.classList.remove("text-slate-600","hover:bg-white/50")}else{b.classList.remove("active");b.classList.add("text-slate-600","hover:bg-white/50")}});const m=document.getElementById("main");if(tab==="dashboard")renderDashboard(m);else if(tab==="items")renderItems(m);else if(tab==="bookings")renderBookings(m);else if(tab==="users")renderUsers(m);else if(tab==="roster")renderRoster(m);else if(tab==="danger")renderDanger(m)}

    ${statCard("ถูกยืม",borrowed,"ถูกยืม","from-rose-400 to-pink-400")}

    ${statCard("ยืม",active,"กำลังยืม","from-amber-400 to-yellow-400")}
    ${statCard("ผู้ใช้",users.length,"ผู้ใช้","from-purple-400 to-fuchsia-400")}

    <div class="glass rounded-2xl p-5 card-shadow"><h3 class="font-bold text-slate-800 mb-3 flex items-center gap-2">สต็อกวัสดุสิ้นเปลือง</h3><div class="space-y-2 max-h-80 overflow-y-auto">${consumables.length?consumables.map(i=>{const init=i.initialStock||1;const pct=Math.round(((i.stock||0)/init)*100);const low=pct<=20;return `<div class="p-3 rounded-lg bg-white/50"><div class="flex justify-between items-center mb-1"><span class="text-sm font-semibold text-slate-700">${esc(i.name)}</span><span class="text-xs font-bold ${low?'text-red-600':'text-slate-600'}">${i.stock||0}/${init}</span></div><div class="h-2 bg-slate-200 rounded-full overflow-hidden"><div class="h-full bg-gradient-to-r ${low?'from-red-400 to-rose-400':'from-orange-400 to-amber-400'}" style="width:${pct}%"></div></div></div>`}).join(""):'<p class="text-sm text-slate-500 text-center py-6">ไม่มีวัสดุสิ้นเปลือง</p>'}</div></div>

function statCard(ic,val,lbl,grad){return `<div class="glass rounded-2xl p-4 card-shadow"><div class="flex items-center gap-3"><div class="w-11 h-11 rounded-xl bg-gradient-to-br ${grad} flex items-center justify-center text-[10px] font-bold text-white shadow flex-shrink-0 px-1 text-center leading-tight">${ic}</div><div class="min-w-0"><div class="text-2xl font-bold text-slate-800">${val}</div><div class="text-xs text-slate-500 truncate">${lbl}</div></div></div></div>`}

function renderItems(el){
  el.innerHTML=`<div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 mb-5"><div><h2 class="section-title">จัดการอุปกรณ์</h2><p class="text-sm text-slate-500 mt-1">ทั้งหมด ${items.length} รายการ</p></div><div class="flex gap-2 flex-wrap"><button id="addItem" class="btn btn-primary">เพิ่มอุปกรณ์</button><button id="bulkAdd" class="btn btn-secondary">เพิ่มเป็นชุด</button></div></div>
  <div class="glass rounded-2xl p-3 mb-4 card-shadow flex flex-col sm:flex-row gap-2"><input id="itSearch" class="input flex-1" placeholder="ค้นหาชื่อ / ID / ประเภท..." /><select id="itFilter" class="input sm:w-48"><option value="">ทุกประเภท</option><option value="reusable">ยืม-คืน</option><option value="consumable">วัสดุสิ้นเปลือง</option><option value="available">ว่าง</option><option value="borrowed">ถูกยืม</option><option value="lowstock">สต็อกต่ำ</option></select></div>
  <div class="glass rounded-2xl overflow-hidden card-shadow"><div class="overflow-x-auto"><table class="tbl"><thead><tr><th>ID</th><th>ชื่อ</th><th>ประเภท</th><th>สถานะ/สต็อก</th><th>การกระทำ</th></tr></thead><tbody id="itBody"></tbody></table></div></div>`;
  document.getElementById("addItem").onclick=()=>openItemEditor(null);
  document.getElementById("bulkAdd").onclick=openBulkAdd;
  const redraw=()=>drawItems(document.getElementById("itSearch").value,document.getElementById("itFilter").value);
  document.getElementById("itSearch").oninput=redraw;document.getElementById("itFilter").onchange=redraw;redraw();
}
function drawItems(s,f){
  const q=(s||"").toLowerCase();
  let list=items.filter(i=>!q||[i.itemId,i.name,i.type].some(x=>(x||"").toLowerCase().includes(q)));
  if(f==="reusable")list=list.filter(i=>!i.consumable);
  else if(f==="consumable")list=list.filter(i=>i.consumable);
  else if(f==="available")list=list.filter(i=>!i.consumable&&i.status==="Available");
  else if(f==="borrowed")list=list.filter(i=>!i.consumable&&i.status==="Borrowed");
  else if(f==="lowstock")list=list.filter(i=>i.consumable&&(i.stock||0)<=(i.initialStock||1)*0.2);
  list.sort((a,b)=>(a.type||"").localeCompare(b.type||"")||(a.number||0)-(b.number||0));
  const body=document.getElementById("itBody");
  if(!list.length){body.innerHTML=`<tr><td colspan="5" class="text-center text-slate-400 py-8">ไม่พบข้อมูล</td></tr>`;return}
  body.innerHTML=list.map(i=>{
    const ic=TYPE_ICONS[i.type]||"❓";
    const statusCell=i.consumable?`<span class="chip ${(i.stock||0)<=0?'bg-red-100 text-red-700':(i.stock||0)<=(i.initialStock||1)*0.2?'bg-amber-100 text-amber-700':'bg-orange-100 text-orange-700'}">📝 ${i.stock||0}/${i.initialStock||0}</span>`:`<span class="chip ${i.status==="Available"?'bg-emerald-100 text-emerald-700':'bg-rose-100 text-rose-700'}">${i.status==="Available"?"ว่าง":"ถูกยืม"}</span>`;
    return `<tr>
      <td data-label="ID"><span class="font-mono text-xs">${esc(i.itemId||i.id)}</span></td>
      <td data-label="ชื่อ"><span class="text-lg mr-2">${ic}</span>${esc(i.name||"-")}</td>
      <td data-label="ประเภท"><span class="chip bg-slate-100 text-slate-700">${esc(i.type||"-")}</span></td>
      <td data-label="สถานะ">${statusCell}</td>
      <td data-label="การกระทำ"><div class="flex gap-1 flex-wrap justify-end">
        ${i.consumable?`<button class="btn btn-secondary btn-xs" data-act="stock" data-id="${i.id}">สต็อก</button>`:(i.status==="Borrowed"?`<button class="btn btn-success btn-xs" data-act="free" data-id="${i.id}">ปลดล็อก</button>`:"")}
        <button class="btn btn-primary btn-xs" data-act="edit" data-id="${i.id}">แก้ไข</button>
        <button class="btn btn-danger btn-xs" data-act="del" data-id="${i.id}">ลบ</button>
      </div></td>
    </tr>`;
  }).join("");
  body.querySelectorAll("button[data-act]").forEach(b=>b.onclick=()=>itemAction(b.dataset.act,b.dataset.id));
}
async function itemAction(act,id){
  const it=items.find(x=>x.id===id);if(!it)return;
  if(act==="edit")openItemEditor(it);
  else if(act==="stock")openStockEditor(it);
  else if(act==="free"){if(!await confirmDialog("ปลดล็อกอุปกรณ์","บังคับตั้งสถานะเป็น 'ว่าง' ?"))return;try{await updateDoc(doc(db,"items",id),{status:"Available"});await loadAll();navigate("items");toast("ปลดล็อกสำเร็จ")}catch(e){toast("ผิดพลาด: "+e.message,"error")}}
  else if(act==="del"){if(!await confirmDialog("ลบอุปกรณ์",`ลบ "${it.name}" ถาวร?`,true))return;try{await deleteDoc(doc(db,"items",id));await loadAll();navigate("items");toast("ลบแล้ว")}catch(e){toast("ผิดพลาด: "+e.message,"error")}}
}
function openItemEditor(it){
  const isNew=!it;const d=it||{itemId:"",name:"",type:"",color:"from-slate-100 to-gray-200",consumable:false,status:"Available",stock:10,initialStock:10,number:1};
  const m=document.createElement("div");m.className="fixed inset-0 modal-bg flex items-center justify-center p-4 z-50";
  m.innerHTML=`<div class="glass-dark rounded-3xl card-shadow max-w-lg w-full p-6 animate-scale max-h-[90vh] overflow-y-auto"><h3 class="text-xl font-bold text-slate-800 mb-5">${isNew?"เพิ่มอุปกรณ์ใหม่":"แก้ไขอุปกรณ์"}</h3><form id="itF" class="space-y-4" novalidate>
    <div class="grid grid-cols-2 gap-3"><div><label class="block text-sm font-semibold mb-1">ID อุปกรณ์</label><input id="f_id" class="input font-mono" value="${esc(d.itemId)}" ${isNew?"":"readonly"} placeholder="เช่น pencil_001" /></div><div><label class="block text-sm font-semibold mb-1">ประเภท (type)</label><input id="f_type" class="input font-mono" value="${esc(d.type)}" placeholder="เช่น pencil" /></div></div>
    <div><label class="block text-sm font-semibold mb-1">ชื่อแสดงผล</label><input id="f_name" class="input" value="${esc(d.name)}" placeholder="เช่น ดินสอ 2B" /></div>
    <div><label class="block text-sm font-semibold mb-1">สีพื้นหลัง</label><select id="f_color" class="input">${COLOR_PALETTE.map(c=>`<option value="${c.v}" ${c.v===d.color?"selected":""}>${c.n}</option>`).join("")}</select><div id="f_preview" class="mt-2 h-12 rounded-xl bg-gradient-to-br ${d.color}"></div></div>
    <div class="glass rounded-xl p-3"><label class="flex items-center gap-3 cursor-pointer"><input id="f_cons" type="checkbox" class="w-5 h-5" ${d.consumable?"checked":""} /><div><div class="font-semibold text-sm">วัสดุสิ้นเปลือง (เบิก ไม่ต้องคืน)</div><div class="text-xs text-slate-500">เช่น กระดาษ, ไส้แม็ก (เบิก ไม่ต้องคืน)</div></div></label></div>
    <div id="f_consFields" class="${d.consumable?"":"hidden"} grid grid-cols-2 gap-3"><div><label class="block text-sm font-semibold mb-1">สต็อกปัจจุบัน</label><input id="f_stock" type="number" min="0" class="input" value="${d.stock||0}" /></div><div><label class="block text-sm font-semibold mb-1">สต็อกตั้งต้น</label><input id="f_init" type="number" min="1" class="input" value="${d.initialStock||d.stock||10}" /></div></div>
    <div id="f_reusFields" class="${d.consumable?"hidden":""} grid grid-cols-2 gap-3"><div><label class="block text-sm font-semibold mb-1">สถานะ</label><select id="f_status" class="input"><option value="Available" ${d.status==="Available"?"selected":""}>ว่าง</option><option value="Borrowed" ${d.status==="Borrowed"?"selected":""}>ถูกยืม</option></select></div><div><label class="block text-sm font-semibold mb-1">หมายเลข</label><input id="f_num" type="number" min="1" class="input" value="${d.number||1}" /></div></div>
    <div class="flex gap-2 pt-2"><button type="button" id="cX" class="btn btn-secondary flex-1">ยกเลิก</button><button type="submit" id="cS" class="btn btn-primary flex-1">${isNew?"เพิ่ม":"บันทึก"}</button></div>
  </form></div>`;
  document.body.appendChild(m);
  const close=()=>m.remove();
  m.onclick=e=>{if(e.target===m)close()};
  m.querySelector("#cX").onclick=close;
  m.querySelector("#f_color").onchange=e=>{m.querySelector("#f_preview").className=`mt-2 h-12 rounded-xl bg-gradient-to-br ${e.target.value}`};
  m.querySelector("#f_cons").onchange=e=>{m.querySelector("#f_consFields").classList.toggle("hidden",!e.target.checked);m.querySelector("#f_reusFields").classList.toggle("hidden",e.target.checked)};
  m.querySelector("#itF").onsubmit=async e=>{
    e.preventDefault();const btn=m.querySelector("#cS");btn.disabled=true;btn.innerHTML='<span class="spinner"></span>';
    try{
      const id=m.querySelector("#f_id").value.trim();const name=m.querySelector("#f_name").value.trim();const type=m.querySelector("#f_type").value.trim();
      if(!id||!name||!type){toast("กรอกข้อมูลให้ครบ","error");btn.disabled=false;btn.innerHTML=isNew?"เพิ่ม":"บันทึก";return}
      const isC=m.querySelector("#f_cons").checked;
      const data={itemId:id,name,type,color:m.querySelector("#f_color").value};
      if(isC){data.consumable=true;data.stock=Math.max(0,parseInt(m.querySelector("#f_stock").value)||0);data.initialStock=Math.max(1,parseInt(m.querySelector("#f_init").value)||10)}
      else{data.consumable=false;data.status=m.querySelector("#f_status").value;data.number=Math.max(1,parseInt(m.querySelector("#f_num").value)||1)}
      if(isNew){const ex=await getDoc(doc(db,"items",id));if(ex.exists()){toast("ID ซ้ำ","error");btn.disabled=false;btn.innerHTML="เพิ่ม";return}await setDoc(doc(db,"items",id),data)}
      else{await updateDoc(doc(db,"items",it.id),data)}
      await loadAll();navigate("items");close();toast(isNew?"เพิ่มสำเร็จ":"บันทึกสำเร็จ")
    }catch(e){console.error(e);toast("ผิดพลาด: "+e.message,"error");btn.disabled=false;btn.innerHTML=isNew?"เพิ่ม":"บันทึก"}
  };
}
function openStockEditor(it){
  const m=document.createElement("div");m.className="fixed inset-0 modal-bg flex items-center justify-center p-4 z-50";
  m.innerHTML=`<div class="glass-dark rounded-3xl card-shadow max-w-sm w-full p-6 animate-scale"><h3 class="text-xl font-bold text-slate-800 mb-1">จัดการสต็อก</h3><p class="text-sm text-slate-500 mb-4">${esc(it.name)}</p><div class="glass rounded-xl p-4 mb-4 text-center"><div class="text-4xl font-bold gradient-text">${it.stock||0}</div><div class="text-xs text-slate-500">/ ${it.initialStock||0} ชิ้น</div></div><div class="grid grid-cols-4 gap-2 mb-3">${[1,5,10,50].map(n=>`<button data-add="${n}" class="btn btn-success btn-xs">+${n}</button>`).join("")}</div><div class="grid grid-cols-4 gap-2 mb-4">${[1,5,10,50].map(n=>`<button data-add="-${n}" class="btn btn-danger btn-xs">-${n}</button>`).join("")}</div><div class="space-y-2 mb-4"><label class="block text-sm font-semibold">ตั้งสต็อกเป็น</label><div class="flex gap-2"><input id="setVal" type="number" min="0" class="input" value="${it.stock||0}" /><button id="setBtn" class="btn btn-primary">ตั้ง</button></div></div><div class="space-y-2 mb-4"><label class="block text-sm font-semibold">ตั้งสต็อกเริ่มต้น</label><div class="flex gap-2"><input id="initVal" type="number" min="1" class="input" value="${it.initialStock||0}" /><button id="initBtn" class="btn btn-secondary">อัปเดต</button></div></div><button id="clX" class="btn btn-secondary w-full">ปิด</button></div>`;
  document.body.appendChild(m);const close=()=>m.remove();m.onclick=e=>{if(e.target===m)close()};m.querySelector("#clX").onclick=close;
  const update=async(patch,msg)=>{try{await updateDoc(doc(db,"items",it.id),patch);Object.assign(it,patch);await loadAll();navigate("items");close();toast(msg)}catch(e){toast("ผิดพลาด: "+e.message,"error")}};
  m.querySelectorAll("button[data-add]").forEach(b=>b.onclick=async()=>{const n=parseInt(b.dataset.add);const newVal=Math.max(0,(it.stock||0)+n);try{await updateDoc(doc(db,"items",it.id),{stock:increment(n)});it.stock=newVal;await loadAll();navigate("items");close();toast(`${n>0?"+":""}${n} ชิ้น`)}catch(e){toast("ผิดพลาด: "+e.message,"error")}});
  m.querySelector("#setBtn").onclick=()=>{const v=Math.max(0,parseInt(m.querySelector("#setVal").value)||0);update({stock:v},`ตั้งสต็อก ${v}`)};
  m.querySelector("#initBtn").onclick=()=>{const v=Math.max(1,parseInt(m.querySelector("#initVal").value)||1);update({initialStock:v},`ตั้งสต็อกเริ่มต้น ${v}`)};
}
function openBulkAdd(){
  const m=document.createElement("div");m.className="fixed inset-0 modal-bg flex items-center justify-center p-4 z-50";
  m.innerHTML=`<div class="glass-dark rounded-3xl card-shadow max-w-md w-full p-6 animate-scale"><h3 class="text-xl font-bold mb-1">เพิ่มเป็นชุด</h3><p class="text-xs text-slate-500 mb-4">เพิ่มอุปกรณ์ยืม-คืนหลายชิ้นพร้อมกัน (type เดียว เลขต่อกัน)</p><form id="bF" class="space-y-3"><div><label class="block text-sm font-semibold mb-1">Type</label><input id="bt" class="input font-mono" placeholder="pencil" required /></div><div><label class="block text-sm font-semibold mb-1">ชื่อ</label><input id="bn" class="input" placeholder="ดินสอ 2B" required /></div><div class="grid grid-cols-2 gap-3"><div><label class="block text-sm font-semibold mb-1">จำนวน</label><input id="bq" type="number" min="1" max="100" value="5" class="input" /></div><div><label class="block text-sm font-semibold mb-1">เริ่มที่เลข</label><input id="bs" type="number" min="1" value="1" class="input" /></div></div><div><label class="block text-sm font-semibold mb-1">สีพื้นหลัง</label><select id="bc" class="input">${COLOR_PALETTE.map(c=>`<option value="${c.v}">${c.n}</option>`).join("")}</select></div><div class="flex gap-2 pt-2"><button type="button" id="bX" class="btn btn-secondary flex-1">ยกเลิก</button><button type="submit" id="bS" class="btn btn-primary flex-1">เพิ่มทั้งหมด</button></div></form></div>`;
  document.body.appendChild(m);const close=()=>m.remove();m.onclick=e=>{if(e.target===m)close()};m.querySelector("#bX").onclick=close;
  m.querySelector("#bF").onsubmit=async e=>{e.preventDefault();const btn=m.querySelector("#bS");btn.disabled=true;btn.innerHTML='<span class="spinner"></span>';
    try{const t=m.querySelector("#bt").value.trim();const n=m.querySelector("#bn").value.trim();const q=Math.min(100,Math.max(1,parseInt(m.querySelector("#bq").value)||1));const s=Math.max(1,parseInt(m.querySelector("#bs").value)||1);const c=m.querySelector("#bc").value;
      if(!t||!n)throw new Error("กรอกให้ครบ");
      const b=writeBatch(db);for(let i=0;i<q;i++){const num=s+i;const id=`${t}_${String(num).padStart(3,"0")}`;b.set(doc(db,"items",id),{itemId:id,type:t,name:n,color:c,status:"Available",number:num,consumable:false})}
      await b.commit();await loadAll();navigate("items");close();toast(`เพิ่ม ${q} ชิ้นสำเร็จ`)
    }catch(e){toast("ผิดพลาด: "+e.message,"error");btn.disabled=false;btn.innerHTML="เพิ่มทั้งหมด"}};
}

function renderBookings(el){
  el.innerHTML=`<div class="mb-5"><h2 class="section-title">การยืม / เบิก</h2><p class="text-sm text-slate-500 mt-1">ทั้งหมด ${bookings.length} รายการ</p></div>
  <div class="glass rounded-2xl p-3 mb-4 card-shadow flex flex-col sm:flex-row gap-2"><input id="bkSearch" class="input flex-1" placeholder="ค้นหา ชื่อ / รหัสนักศึกษา / อุปกรณ์..." /><select id="bkFilter" class="input sm:w-48"><option value="">ทุกสถานะ</option><option value="Active">กำลังยืม</option><option value="Returned">คืนแล้ว</option><option value="Consumed">เบิกแล้ว</option></select></div>
  <div class="glass rounded-2xl overflow-hidden card-shadow"><div class="overflow-x-auto"><table class="tbl"><thead><tr><th>อุปกรณ์</th><th>ผู้ยืม</th><th>เวลา/จำนวน</th><th>สถานะ</th><th></th></tr></thead><tbody id="bkBody"></tbody></table></div></div>`;
  const r=()=>drawBookings(document.getElementById("bkSearch").value,document.getElementById("bkFilter").value);
  document.getElementById("bkSearch").oninput=r;document.getElementById("bkFilter").onchange=r;r();
}
function drawBookings(s,f){
  const q=(s||"").toLowerCase();
  let list=bookings.filter(b=>!q||[b.itemName,b.studentName,b.studentId,b.itemId].some(x=>(x||"").toLowerCase().includes(q)));
  if(f)list=list.filter(b=>b.status===f);
  const body=document.getElementById("bkBody");
  if(!list.length){body.innerHTML=`<tr><td colspan="5" class="text-center text-slate-400 py-8">ไม่พบข้อมูล</td></tr>`;return}
  body.innerHTML=list.map(b=>{
    const isC=b.status==="Consumed"||b.consumable;
    const stat=b.status==="Active"?'<span class="chip bg-amber-100 text-amber-700">กำลังยืม</span>':b.status==="Returned"?'<span class="chip bg-emerald-100 text-emerald-700">คืนแล้ว</span>':'<span class="chip bg-orange-100 text-orange-700">เบิกแล้ว</span>';
    const timeCell=isC?`<span class="font-semibold text-orange-600">×${b.quantity||1} ชิ้น</span><br><span class="text-xs text-slate-500">${fmtTs(b.createdAt)}</span>`:`${fmtDate(b.startTime)} → ${fmtDate(b.endTime)}`;
    return `<tr>
      <td data-label="อุปกรณ์"><div class="font-semibold">${esc(b.itemName||"-")}</div><div class="text-xs text-slate-500 font-mono">${esc(b.itemId||"-")}</div></td>
      <td data-label="ผู้ยืม"><div class="font-semibold">${esc(b.studentName||"-")}</div><div class="text-xs text-slate-500">${esc(b.studentId||"-")} • ปี ${esc(b.yearOfStudy||"-")}</div></td>
      <td data-label="เวลา">${timeCell}</td>
      <td data-label="สถานะ">${stat}</td>
      <td data-label="การกระทำ"><div class="flex gap-1 justify-end flex-wrap">${b.status==="Active"?`<button class="btn btn-success btn-xs" data-act="ret" data-bid="${b.id}" data-iid="${b.itemId}">บังคับคืน</button>`:""}<button class="btn btn-danger btn-xs" data-act="del" data-bid="${b.id}">ลบ</button></div></td>
    </tr>`;
  }).join("");
  body.querySelectorAll("button[data-act]").forEach(btn=>btn.onclick=()=>bkAction(btn.dataset.act,btn.dataset.bid,btn.dataset.iid));
}
async function bkAction(act,bid,iid){
  if(act==="ret"){if(!await confirmDialog("บังคับคืน","ตั้งสถานะเป็นคืนแล้ว?"))return;try{await updateDoc(doc(db,"bookings",bid),{status:"Returned",returnedAt:serverTimestamp()});const it=items.find(x=>x.itemId===iid);if(it)await updateDoc(doc(db,"items",it.id),{status:"Available"});await loadAll();navigate("bookings");toast("คืนแล้ว")}catch(e){toast("ผิดพลาด: "+e.message,"error")}}
  else if(act==="del"){if(!await confirmDialog("ลบรายการ","ลบรายการนี้ถาวร?",true))return;try{await deleteDoc(doc(db,"bookings",bid));await loadAll();navigate("bookings");toast("ลบแล้ว")}catch(e){toast("ผิดพลาด: "+e.message,"error")}}
}

function renderUsers(el){
  el.innerHTML=`<div class="mb-5"><h2 class="section-title">ผู้ใช้งาน</h2><p class="text-sm text-slate-500 mt-1">ทั้งหมด ${users.length} คน</p></div>
  <div class="glass rounded-2xl p-3 mb-4 card-shadow"><input id="uSearch" class="input" placeholder="ค้นหา รหัส / ชื่อ..." /></div>
  <div class="glass rounded-2xl overflow-hidden card-shadow"><div class="overflow-x-auto"><table class="tbl"><thead><tr><th>รหัสนักศึกษา</th><th>ชื่อ - นามสกุล</th><th>ชั้นปี</th><th>ประวัติยืม</th><th></th></tr></thead><tbody id="uBody"></tbody></table></div></div>`;
  const r=()=>drawUsers(document.getElementById("uSearch").value);document.getElementById("uSearch").oninput=r;r();
}
function drawUsers(s){
  const q=(s||"").toLowerCase();
  const list=users.filter(u=>!q||[u.studentId,u.fullName].some(x=>(x||"").toLowerCase().includes(q)));
  const body=document.getElementById("uBody");
  if(!list.length){body.innerHTML=`<tr><td colspan="5" class="text-center text-slate-400 py-8">ไม่พบผู้ใช้</td></tr>`;return}
  body.innerHTML=list.map(u=>{const cnt=bookings.filter(b=>b.studentId===u.studentId).length;return `<tr>
    <td data-label="รหัส"><span class="font-mono font-semibold">${esc(u.studentId)}</span></td>
    <td data-label="ชื่อ">${esc(u.fullName)}</td>
    <td data-label="ปี"><span class="chip bg-blue-100 text-blue-700">ปี ${esc(u.yearOfStudy||"-")}</span></td>
    <td data-label="ประวัติ">${cnt} ครั้ง</td>
    <td data-label=""><button class="btn btn-danger btn-xs" data-del="${u.id}">ลบ</button></td>
  </tr>`}).join("");
  body.querySelectorAll("button[data-del]").forEach(b=>b.onclick=async()=>{if(!await confirmDialog("ลบผู้ใช้","ลบผู้ใช้นี้?",true))return;try{await deleteDoc(doc(db,"users",b.dataset.del));await loadAll();navigate("users");toast("ลบแล้ว")}catch(e){toast("ผิดพลาด: "+e.message,"error")}});
}

function renderRoster(el){
  el.innerHTML=`<div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 mb-5"><div><h2 class="section-title">รายชื่อนักศึกษาปี 1</h2><p class="text-sm text-slate-500 mt-1">ฐานข้อมูล ${roster.length} คน (ใช้สำหรับ login ปี 1)</p></div><div class="flex gap-2 flex-wrap"><button id="rAdd" class="btn btn-primary">เพิ่มรายชื่อ</button><button id="rSeed" class="btn btn-secondary">เติมจากรายชื่อตั้งต้น</button></div></div>
  <div class="glass rounded-2xl p-3 mb-4 card-shadow"><input id="rSearch" class="input" placeholder="ค้นหา รหัส / ชื่อ..." /></div>
  <div class="glass rounded-2xl overflow-hidden card-shadow"><div class="overflow-x-auto"><table class="tbl"><thead><tr><th>รหัสนักศึกษา</th><th>ชื่อ - นามสกุล</th><th></th></tr></thead><tbody id="rBody"></tbody></table></div></div>`;
  const draw=()=>{const q=(document.getElementById("rSearch").value||"").toLowerCase();const list=roster.filter(u=>!q||[u.studentId,u.fullName].some(x=>(x||"").toLowerCase().includes(q)));const body=document.getElementById("rBody");if(!list.length){body.innerHTML=`<tr><td colspan="3" class="text-center text-slate-400 py-8">ไม่พบรายชื่อ</td></tr>`;return}body.innerHTML=list.map(u=>`<tr><td data-label="รหัส"><span class="font-mono font-semibold">${esc(u.studentId)}</span></td><td data-label="ชื่อ">${esc(u.fullName)}</td><td data-label=""><div class="flex gap-1 justify-end"><button class="btn btn-primary btn-xs" data-edit="${u.id}">แก้ไข</button><button class="btn btn-danger btn-xs" data-del="${u.id}">ลบ</button></div></td></tr>`).join("");body.querySelectorAll("button[data-edit]").forEach(b=>b.onclick=()=>openRosterEditor(roster.find(x=>x.id===b.dataset.edit)));body.querySelectorAll("button[data-del]").forEach(b=>b.onclick=async()=>{if(!await confirmDialog("ลบรายชื่อ","ลบรายชื่อนี้จากฐานข้อมูล?",true))return;try{await deleteDoc(doc(db,"year1_roster",b.dataset.del));await loadAll();navigate("roster");toast("ลบแล้ว")}catch(e){toast("ผิดพลาด: "+e.message,"error")}})};
  document.getElementById("rSearch").oninput=draw;
  document.getElementById("rAdd").onclick=()=>openRosterEditor(null);
  document.getElementById("rSeed").onclick=async()=>{if(!await confirmDialog("เติมรายชื่อตั้งต้น","เพิ่มรายชื่อ "+YEAR1_ROSTER_SEED.length+" คนจาก list เริ่มต้น? (รายชื่อเดิมจะไม่ถูกทับ)"))return;try{const b=writeBatch(db);let added=0;for(const r of YEAR1_ROSTER_SEED){const ex=roster.find(x=>x.studentId===r.id);if(!ex){b.set(doc(db,"year1_roster",r.id),{studentId:r.id,fullName:r.name});added++}}if(!added){toast("รายชื่อครบอยู่แล้ว","info");return}await b.commit();await loadAll();navigate("roster");toast("เพิ่ม "+added+" รายชื่อ")}catch(e){toast("ผิดพลาด: "+e.message,"error")}};
  draw();
}
function openRosterEditor(r){
  const isNew=!r;const d=r||{studentId:"",fullName:""};
  const m=document.createElement("div");m.className="fixed inset-0 modal-bg flex items-center justify-center p-4 z-50";
  m.innerHTML=`<div class="glass-dark rounded-3xl card-shadow max-w-md w-full p-6 animate-scale"><h3 class="text-xl font-bold mb-4">${isNew?"เพิ่มรายชื่อนักศึกษาปี 1":"แก้ไขรายชื่อ"}</h3><form id="rF" class="space-y-4" novalidate><div><label class="block text-sm font-semibold mb-1">รหัสนักศึกษา (10 หลัก)</label><input id="rS" inputmode="numeric" maxlength="10" class="input font-mono" value="${esc(d.studentId)}" ${isNew?"":"readonly"} placeholder="เช่น 6824763012" /></div><div><label class="block text-sm font-semibold mb-1">ชื่อ - นามสกุล (พร้อมคำนำหน้า)</label><input id="rN" class="input" value="${esc(d.fullName)}" placeholder="เช่น นางสาวกชพรรณ แก้วมา" /></div><div class="flex gap-2 pt-2"><button type="button" id="rX" class="btn btn-secondary flex-1">ยกเลิก</button><button type="submit" id="rY" class="btn btn-primary flex-1">${isNew?"เพิ่ม":"บันทึก"}</button></div></form></div>`;
  document.body.appendChild(m);const close=()=>m.remove();m.onclick=e=>{if(e.target===m)close()};m.querySelector("#rX").onclick=close;
  m.querySelector("#rF").onsubmit=async e=>{e.preventDefault();const sid=m.querySelector("#rS").value.trim();const fn=m.querySelector("#rN").value.trim();if(!/^\d{10}$/.test(sid))return toast("รหัสต้องเป็นตัวเลข 10 หลัก","error");if(fn.length<3)return toast("ชื่อสั้นเกินไป","error");const btn=m.querySelector("#rY");btn.disabled=true;btn.innerHTML='<span class="spinner"></span>';try{if(isNew){const ex=await getDoc(doc(db,"year1_roster",sid));if(ex.exists()){toast("รหัสนี้มีอยู่แล้ว","error");btn.disabled=false;btn.innerHTML="เพิ่ม";return}}await setDoc(doc(db,"year1_roster",sid),{studentId:sid,fullName:fn});await loadAll();navigate("roster");close();toast(isNew?"เพิ่มสำเร็จ":"บันทึกสำเร็จ")}catch(er){toast("ผิดพลาด: "+er.message,"error");btn.disabled=false;btn.innerHTML=isNew?"เพิ่ม":"บันทึก"}};
}
function renderDanger(el){
  el.innerHTML=`<div class="mb-5"><h2 class="section-title">ฟังก์ชันขั้นสูง</h2><p class="text-sm text-red-500 mt-1">การกระทำในหน้านี้ไม่สามารถย้อนกลับได้ โปรดใช้ด้วยความระมัดระวัง</p></div>
  <div class="grid md:grid-cols-2 gap-4">
    <div class="glass rounded-2xl p-5 card-shadow border-2 border-amber-200"><h3 class="font-bold text-amber-700 mb-2">รีเซ็ตสถานะอุปกรณ์</h3><p class="text-sm text-slate-600 mb-3">คืนสถานะอุปกรณ์ยืม-คืนทั้งหมดเป็น "ว่าง" และเติมสต็อกวัสดุสิ้นเปลืองกลับเต็ม</p><button id="dR" class="btn btn-primary w-full">รีเซ็ตสถานะ</button></div>
    <div class="glass rounded-2xl p-5 card-shadow border-2 border-orange-200"><h3 class="font-bold text-orange-700 mb-2">ลบการยืมทั้งหมด</h3><p class="text-sm text-slate-600 mb-3">ลบประวัติการยืม/เบิกทุกรายการ (อุปกรณ์จะไม่ถูกแตะ)</p><button id="dB" class="btn btn-danger w-full">ลบประวัติ</button></div>
    <div class="glass rounded-2xl p-5 card-shadow border-2 border-red-200"><h3 class="font-bold text-red-700 mb-2">ลบผู้ใช้ทั้งหมด</h3><p class="text-sm text-slate-600 mb-3">ลบข้อมูลผู้ใช้ทั้งหมดออกจากระบบ</p><button id="dU" class="btn btn-danger w-full">ลบผู้ใช้</button></div>
    <div class="glass rounded-2xl p-5 card-shadow border-2 border-red-300"><h3 class="font-bold text-red-800 mb-2">ลบอุปกรณ์ทั้งหมด</h3><p class="text-sm text-slate-600 mb-3">ลบรายการอุปกรณ์ทุกชิ้น (หน้าผู้ใช้จะ seed ใหม่อัตโนมัติเมื่อเข้า)</p><button id="dI" class="btn btn-danger w-full">ลบอุปกรณ์</button></div>
  </div>`;
  document.getElementById("dR").onclick=async()=>{if(!await confirmDialog("รีเซ็ตสถานะ","ยืนยันการรีเซ็ต?",true))return;try{const b=writeBatch(db);items.forEach(i=>{if(i.consumable)b.update(doc(db,"items",i.id),{stock:i.initialStock||0});else b.update(doc(db,"items",i.id),{status:"Available"})});await b.commit();await loadAll();navigate("danger");toast("รีเซ็ตเรียบร้อย")}catch(e){toast("ผิดพลาด: "+e.message,"error")}};
  document.getElementById("dB").onclick=()=>batchDel("bookings","ประวัติการยืม");
  document.getElementById("dU").onclick=()=>batchDel("users","ข้อมูลผู้ใช้");
  document.getElementById("dI").onclick=()=>batchDel("items","อุปกรณ์");
}
async function batchDel(coll,label){
  if(!await confirmDialog(`ลบ${label}`,`ลบ${label}ทั้งหมด? ไม่สามารถย้อนกลับได้`,true))return;
  try{const snap=await getDocs(collection(db,coll));const b=writeBatch(db);snap.docs.forEach(d=>b.delete(d.ref));await b.commit();await loadAll();navigate("danger");toast(`ลบ${label}เรียบร้อย`)}catch(e){toast("ผิดพลาด: "+e.message,"error")}
}

if(document.readyState==="loading")document.addEventListener("DOMContentLoaded",init);else init();
</script>
</body>
</html>
